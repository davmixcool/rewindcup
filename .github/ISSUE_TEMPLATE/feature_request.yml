name: Feature request
description: Propose an improvement to the archive or contribution workflow.
title: "Feature: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: Who is affected, and what are they trying to accomplish?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed experience
      description: Describe the behavior rather than only the implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: accessibility
    attributes:
      label: Accessibility and device considerations
      description: Note keyboard, screen-reader, reduced-motion, mobile, or performance implications.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and pull requests.
          required: true
