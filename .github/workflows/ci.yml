name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Type, data, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run validate:data
      - run: npm run audit:journey
      - run: npm run audit:highlights
      - run: npm run build

  e2e:
    name: Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run end-to-end tests
        shell: bash
        run: |
          set -euo pipefail
          npm run dev > /tmp/rewindcup-dev.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true; wait "$server_pid" 2>/dev/null || true' EXIT

          ready=false
          for attempt in {1..90}; do
            if [[ -s .dev-url ]]; then
              base_url="$(tr -d '\r\n' < .dev-url)"
              if curl --fail --silent --show-error "$base_url" > /dev/null; then
                ready=true
                break
              fi
            fi

            if ! kill -0 "$server_pid" 2>/dev/null; then
              cat /tmp/rewindcup-dev.log
              exit 1
            fi
            sleep 1
          done

          if [[ "$ready" != true ]]; then
            cat /tmp/rewindcup-dev.log
            exit 1
          fi

          npm run test:e2e
      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics
          if-no-files-found: ignore
          path: |
            test-results
            playwright-report
            /tmp/rewindcup-dev.log
